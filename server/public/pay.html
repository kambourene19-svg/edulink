<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FasoPay - Simulateur de Paiement</title>
    <style>
        :root {
            --primary-orange: #f97316;
            --primary-moov: #1e3a8a;
            --background: #f8fafc;
            --text: #0f172a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .operator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 2rem 0;
        }

        .operator-btn {
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .operator-btn:hover {
            border-color: #cbd5e1;
            background: #f8fafc;
        }

        .op-logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .orange-logo {
            background: #f97316;
        }

        .moov-logo {
            background: #0088cc;
        }

        .amount-card {
            background: #f1f5f9;
            padding: 1.5rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
        }

        .amount {
            font-size: 2rem;
            font-weight: 800;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #64748b;
        }

        .detail-value {
            font-weight: 600;
            color: var(--text);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .btn-primary {
            background: var(--primary-orange);
            color: white;
        }

        .btn-outline {
            background: transparent;
            color: #94a3b8;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: #eefdf5;
            color: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
        }
    </style>
</head>

<body>
    <div id="debug-log"
        style="display:none; position:fixed; bottom:0; left:0; right:0; background:black; color:lime; font-family:monospace; font-size:10px; padding:5px; max-height:60px; overflow:auto; z-index:9999; border-top:1px solid #333;">
    </div>

    <div class="container">
        <!-- ÉTAPE 1: CHOIX OPÉRATEUR -->
        <div id="step-1" class="step active" style="display:block">
            <h2 style="margin:0">Méthode de Paiement</h2>
            <p style="color:#64748b">Choisissez votre opérateur</p>
            <div class="operator-grid">
                <div class="operator-btn" onclick="selectOperator('ORANGE')">
                    <div class="op-logo orange-logo">OM</div>
                    <span style="font-weight:700">Orange</span>
                </div>
                <div class="operator-btn" onclick="selectOperator('MOOV')">
                    <div class="op-logo moov-logo">MM</div>
                    <span style="font-weight:700">Moov</span>
                </div>
            </div>
        </div>

        <!-- ÉTAPE 2: VALIDATION -->
        <div id="step-2" class="step">
            <div id="op-indicator"
                style="font-size:0.75rem; font-weight:bold; padding:4px 12px; border-radius:100px; display:inline-block; margin-bottom:1rem">
            </div>
            <h2 id="op-name" style="margin:0">Orange Money</h2>
            <div class="amount-card">
                <div style="font-size:0.7rem; text-transform:uppercase; font-weight:700; color:#64748b">Montant à régler
                </div>
                <div class="amount" id="display-amount">0 FCFA</div>
            </div>
            <div style="text-align:left; border-top:1px solid #f1f5f9; padding-top:1rem">
                <div class="detail-row"><span>Référence :</span><span class="detail-value" id="display-ref">...</span>
                </div>
                <div class="detail-row"><span>Téléphone :</span><span class="detail-value" id="display-phone">...</span>
                </div>
            </div>
            <button class="btn btn-primary" id="confirm-btn" onclick="processPayment()">Confirmer le paiement</button>
            <button class="btn btn-outline" onclick="window.location.reload()">Retour</button>
        </div>

        <!-- ÉTAPE 3: SUCCÈS -->
        <div id="step-3" class="step">
            <div class="success-icon">✓</div>
            <h2 style="margin:0">Paiement Réussi !</h2>
            <p style="color:#64748b">Votre ticket a été généré avec succès.</p>
            <button class="btn btn-primary" onclick="finish()">Terminer l'achat</button>
        </div>
    </div>

    <script>
        function log(msg) {
            console.log(msg);
            var d = document.getElementById('debug-log');
            d.style.display = 'block';
            d.innerHTML += '> ' + msg + '<br>';
            d.scrollTop = d.scrollHeight;
        }

        var params = {};

        function init() {
            try {
                log('Initialisation...');
                var search = window.location.search.substring(1);
                var pairs = search.split('&');
                for (var i = 0; i < pairs.length; i++) {
                    var pair = pairs[i].split('=');
                    if (pair[0]) params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1] || "");
                }

                document.getElementById('display-amount').innerText = (params.amount || 0) + ' FCFA';
                document.getElementById('display-ref').innerText = (params.bookingId || '').substring(0, 8) || '...';
                document.getElementById('display-phone').innerText = params.phone || "...";
                log('Prêt pour: ' + params.bookingId);
            } catch (e) {
                log('ERREUR INIT: ' + e.message);
            }
        }

        window.selectOperator = function (op) {
            try {
                log('Clic sur: ' + op);
                var s1 = document.getElementById('step-1');
                var s2 = document.getElementById('step-2');
                var ind = document.getElementById('op-indicator');
                var btn = document.getElementById('confirm-btn');
                var name = document.getElementById('op-name');

                if (op === 'ORANGE') {
                    name.innerText = 'Orange Money';
                    ind.style.background = '#fff7ed';
                    ind.style.color = '#f97316';
                    ind.innerText = 'ORANGE MONEY';
                    btn.style.background = '#f97316';
                } else {
                    name.innerText = 'Moov Money';
                    ind.style.background = '#eff6ff';
                    ind.style.color = '#1e3a8a';
                    ind.innerText = 'MOOV MONEY';
                    btn.style.background = '#1e3a8a';
                }

                s1.style.display = 'none';
                s2.style.display = 'block';
                log('Passage à la validation');
            } catch (e) {
                log('ERREUR CLIC: ' + e.message);
            }
        };

        window.processPayment = async function () {
            var btn = document.getElementById('confirm-btn');
            btn.disabled = true;
            btn.innerText = 'Validation...';
            log('Validation en cours...');

            try {
                var r = await fetch('/api/bookings/payment-webhook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        bookingId: params.bookingId,
                        status: 'SUCCESS',
                        secret: 'fasoticket_secure_webhook_2026_xYz'
                    })
                });

                if (r.ok) {
                    log('SUCCÈS !');
                    document.getElementById('step-2').style.display = 'none';
                    document.getElementById('step-3').style.display = 'block';
                } else {
                    log('ERREUR API: ' + r.status);
                    alert("Erreur de paiement.");
                    btn.disabled = false;
                    btn.innerText = 'Réessayer';
                }
            } catch (e) {
                log('ERREUR RÉSEAU: ' + e.message);
                alert("Erreur réseau.");
                btn.disabled = false;
            }
        };

        window.finish = function () {
            window.location.href = "https://fasoticket.vercel.app/dashboard";
        };

        init();
    </script>
</body>

</html>
