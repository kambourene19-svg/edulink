<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FasoPay - Simulateur de Paiement</title>
    <style>
        :root {
            --primary-orange: #f97316;
            --primary-moov: #1e3a8a;
            --background: #f8fafc;
            --text: #0f172a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .operator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 2rem 0;
        }

        .operator-btn {
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .operator-btn:hover {
            border-color: #cbd5e1;
            background: #f8fafc;
        }

        .operator-btn.selected {
            border-color: var(--primary-orange);
            background: #fff7ed;
        }

        .operator-btn.moov.selected {
            border-color: var(--primary-moov);
            background: #eff6ff;
        }

        .op-logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        .orange-logo {
            background: #f97316;
        }

        .moov-logo {
            background: #0088cc;
        }

        .amount-card {
            background: #f1f5f9;
            padding: 1.5rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
        }

        .amount {
            font-size: 2rem;
            font-weight: 800;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #64748b;
        }

        .detail-value {
            font-weight: 600;
            color: var(--text);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .btn-primary {
            background: var(--primary-orange);
            color: white;
        }

        .btn-moov {
            background: var(--primary-moov);
            color: white;
        }

        .btn-outline {
            background: transparent;
            color: #94a3b8;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: #eefdf5;
            color: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- ÉTAPE 1: CHOIX OPÉRATEUR -->
        <div id="step-1" class="step active">
            <h2 style="margin:0">Méthode de Paiement</h2>
            <p style="color:#64748b">Choisissez votre opérateur</p>
            <div class="operator-grid">
                <div class="operator-btn" onclick="selectOperator('ORANGE')">
                    <div class="op-logo orange-logo">OM</div>
                    <span style="font-weight:700">Orange</span>
                </div>
                <div class="operator-btn moov" onclick="selectOperator('MOOV')">
                    <div class="op-logo moov-logo">MM</div>
                    <span style="font-weight:700">Moov</span>
                </div>
            </div>
        </div>

        <!-- ÉTAPE 2: VALIDATION -->
        <div id="step-2" class="step">
            <div id="op-indicator"
                style="font-size:0.75rem; font-weight:bold; padding:4px 12px; border-radius:100px; display:inline-block; margin-bottom:1rem">
            </div>
            <h2 id="op-name" style="margin:0">Orange Money</h2>
            <div class="amount-card">
                <div style="font-size:0.7rem; text-transform:uppercase; font-weight:700; color:#64748b">Montant à régler
                </div>
                <div class="amount" id="display-amount">0 FCFA</div>
            </div>
            <div style="text-align:left; border-top:1px solid #f1f5f9; padding-top:1rem">
                <div class="detail-row"><span>Référence :</span><span class="detail-value" id="display-ref">...</span>
                </div>
                <div class="detail-row"><span>Téléphone :</span><span class="detail-value" id="display-phone">...</span>
                </div>
            </div>
            <button class="btn btn-primary" id="confirm-btn" onclick="processPayment()">Confirmer le paiement</button>
            <button class="btn btn-outline" onclick="window.location.reload()">Retour</button>
        </div>

        <!-- ÉTAPE 3: SUCCÈS -->
        <div id="step-3" class="step">
            <div class="success-icon">✓</div>
            <h2 style="margin:0">Paiement Réussi !</h2>
            <p style="color:#64748b">Votre ticket a été généré avec succès.</p>
            <div id="redirect-context"
                style="margin:2rem 0; font-size:0.9rem; padding:1rem; background:#f8fafc; border-radius:1rem">
                Si vous ne voyez pas votre ticket, cliquez sur le bouton ci-dessous.
            </div>
            <button class="btn btn-primary" id="final-btn" onclick="finish()">Terminer l'achat</button>
        </div>
    </div>

    <script>
        let params = {};
        let selectedOp = 'ORANGE';

        function init() {
            const search = window.location.search.substring(1);
            search.split('&').forEach(p => {
                const [k, v] = p.split('=');
                params[decodeURIComponent(k)] = decodeURIComponent(v || "");
            });
            document.getElementById('display-amount').textContent = (params.amount || 0) + ' FCFA';
            document.getElementById('display-ref').textContent = (params.bookingId || '').substring(0, 8);
            document.getElementById('display-phone').textContent = params.phone || "...";
        }

        function selectOperator(op) {
            selectedOp = op;
            const step2 = document.getElementById('step-2');
            const indicator = document.getElementById('op-indicator');
            const confirmBtn = document.getElementById('confirm-btn');

            if (op === 'ORANGE') {
                document.getElementById('op-name').textContent = 'Orange Money';
                indicator.style.background = '#fff7ed';
                indicator.style.color = '#f97316';
                indicator.textContent = 'ORANGE MONEY';
                confirmBtn.style.background = '#f97316';
            } else {
                document.getElementById('op-name').textContent = 'Moov Money';
                indicator.style.background = '#eff6ff';
                indicator.style.color = '#1e3a8a';
                indicator.textContent = 'MOOV MONEY';
                confirmBtn.style.background = '#1e3a8a';
            }

            document.getElementById('step-1').classList.remove('active');
            step2.classList.add('active');
        }

        async function processPayment() {
            const btn = document.getElementById('confirm-btn');
            btn.disabled = true;
            btn.textContent = 'Validation en cours...';

            try {
                const resp = await fetch('/api/bookings/payment-webhook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        bookingId: params.bookingId,
                        status: 'SUCCESS',
                        secret: 'fasoticket_secure_webhook_2026_xYz' // Ce secret est public dans le simulateur
                    })
                });

                if (resp.ok) {
                    document.getElementById('step-2').classList.remove('active');
                    document.getElementById('step-3').classList.add('active');
                } else {
                    alert("Erreur serveur lors de la validation.");
                    btn.disabled = false;
                    btn.textContent = 'Réessayer';
                }
            } catch (e) {
                alert("Erreur réseau. Vérifiez votre connexion.");
                btn.disabled = false;
                btn.textContent = 'Réessayer';
            }
        }

        function finish() {
            // Détection du contexte (Web vs Mobile App)
            const isWeb = !window.navigator.userAgent.includes('FasoTicketApp') && !document.referrer.includes('fasoticket://');

            if (isWeb) {
                // Sur le Web, on redirige vers le dashboard ou on ferme
                try {
                    window.opener.location.reload(); // Rafraîchir le dashboard parent
                    window.close(); // Fermer le simulateur
                } catch (e) {
                    window.location.href = "https://fasoticket.vercel.app/dashboard";
                }
            } else {
                // Sur Mobile App, on tente le Deep Link
                window.location.href = "fasoticket://payment-success?bookingId=" + params.bookingId;
            }
        }

        init();
    </script>
</body>

</html>
