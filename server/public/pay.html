<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>FasoPay - Simulateur de Paiement v2.1</title>
    <style>
        :root {
            --primary-orange: #f97316;
            --primary-moov: #1e3a8a;
            --background: #f8fafc;
            --text: #0f172a;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: relative;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .operator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 2rem 0;
        }

        .operator-btn {
            border: 2px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            -webkit-tap-highlight-color: transparent;
        }

        .operator-btn:active {
            transform: scale(0.95);
            background: #f1f5f9;
        }

        .op-logo {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            pointer-events: none;
        }

        .orange-logo {
            background: #f97316;
        }

        .moov-logo {
            background: #0088cc;
        }

        .amount-card {
            background: #f1f5f9;
            padding: 1.5rem;
            border-radius: 1rem;
            margin: 1.5rem 0;
        }

        .amount {
            font-size: 2rem;
            font-weight: 800;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #64748b;
        }

        .detail-value {
            font-weight: 600;
            color: var(--text);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .btn-primary {
            background: var(--primary-orange);
            color: white;
        }

        .btn-outline {
            background: transparent;
            color: #94a3b8;
            border: 1px solid #e2e8f0;
        }

        .success-icon {
            width: 64px;
            height: 64px;
            background: #eefdf5;
            color: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
        }

        #debug-log {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.8);
            color: #0f0;
            font-family: monospace;
            font-size: 10px;
            padding: 5px;
            max-height: 80px;
            overflow: auto;
            z-index: 10000;
            display: block;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="debug-log">Initialisation v2.1...<br></div>

    <div class="container">
        <!-- ÉTAPE 1: CHOIX OPÉRATEUR -->
        <div id="step-1" class="step active">
            <h2 style="margin:0">Paiement FasoTicket</h2>
            <p style="color:#64748b">Choisissez votre moyen de dépôt</p>
            <div class="operator-grid">
                <div id="btn-orange" class="operator-btn" role="button">
                    <div class="op-logo orange-logo">OM</div>
                    <span style="font-weight:700">Orange</span>
                </div>
                <div id="btn-moov" class="operator-btn" role="button">
                    <div class="op-logo moov-logo">MM</div>
                    <span style="font-weight:700">Moov</span>
                </div>
            </div>
        </div>

        <!-- ÉTAPE 2: VALIDATION -->
        <div id="step-2" class="step">
            <div id="op-indicator"
                style="font-size:0.75rem; font-weight:bold; padding:4px 12px; border-radius:100px; display:inline-block; margin-bottom:1rem">
            </div>
            <h2 id="op-title" style="margin:0">...</h2>
            <div class="amount-card">
                <div style="font-size:0.7rem; text-transform:uppercase; font-weight:700; color:#64748b">Montant total
                </div>
                <div class="amount" id="display-amount">0 FCFA</div>
            </div>
            <div style="text-align:left; border-top:1px solid #f1f5f9; padding-top:1rem; margin-bottom:1rem">
                <div class="detail-row"><span>Référence :</span><span class="detail-value" id="display-ref">...</span>
                </div>
                <div class="detail-row"><span>Contact :</span><span class="detail-value" id="display-phone">...</span>
                </div>
            </div>
            <button class="btn btn-primary" id="confirm-btn">Confirmer le dépôt</button>
            <button class="btn btn-outline" id="back-btn">Modifier l'opérateur</button>
        </div>

        <!-- ÉTAPE 3: SUCCÈS -->
        <div id="step-3" class="step">
            <div class="success-icon">✓</div>
            <h2 style="margin:0">Transaction Réussie</h2>
            <p style="color:#64748b">Félicitations ! Votre paiement a été validé.</p>
            <button class="btn btn-primary" id="finish-btn">Terminer l'achat</button>
        </div>
    </div>

    <script>
        (function () {
            var logEl = document.getElementById('debug-log');
            function log(m) {
                console.log(m);
                logEl.innerHTML += '> ' + m + '<br>';
                logEl.scrollTop = logEl.scrollHeight;
            }

            var params = {};

            function parseURL() {
                var search = window.location.search.substring(1);
                var pairs = search.split('&');
                for (var i = 0; i < pairs.length; i++) {
                    var p = pairs[i].split('=');
                    if (p[0]) params[decodeURIComponent(p[0])] = decodeURIComponent(p[1] || "");
                }
                log('Params: ' + (params.bookingId ? 'Booking OK' : 'NO Booking'));
            }

            function setupUI() {
                document.getElementById('display-amount').innerText = (params.amount || 0) + ' FCFA';
                // Formatage pro de la référence
                var rawRef = (params.bookingId || '').replace(/-/g, '').substring(0, 8).toUpperCase();
                document.getElementById('display-ref').innerText = rawRef ? 'FT-' + rawRef : '...';
                document.getElementById('display-phone').innerText = params.phone || "...";
            }

            function selectOp(op) {
                log('Sélection: ' + op);
                var s1 = document.getElementById('step-1');
                var s2 = document.getElementById('step-2');
                var ind = document.getElementById('op-indicator');
                var title = document.getElementById('op-title');
                var btn = document.getElementById('confirm-btn');

                if (op === 'ORANGE') {
                    title.innerText = 'Orange Money';
                    ind.style.background = '#fff7ed';
                    ind.style.color = '#f97316';
                    ind.innerText = 'ORANGE MONEY';
                    btn.style.background = '#f97316';
                } else {
                    title.innerText = 'Moov Money';
                    ind.style.background = '#eff6ff';
                    ind.style.color = '#1e3a8a';
                    ind.innerText = 'MOOV MONEY';
                    btn.style.background = '#1e3a8a';
                }

                s1.style.display = 'none';
                s2.style.display = 'block';
            }

            async function validate() {
                var btn = document.getElementById('confirm-btn');
                btn.disabled = true;
                btn.innerText = 'Validation Réseau...';
                log('Appel Webhook...');

                const webhookUrl = window.location.origin + '/api/bookings/payment-webhook';
                log('URL: ' + webhookUrl);

                try {
                    var r = await fetch(webhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            bookingId: params.bookingId,
                            status: 'SUCCESS',
                            secret: 'fasoticket_secure_webhook_2026_xYz'
                        })
                    });
                    if (r.ok) {
                        log('SUCCESS 200');
                        document.getElementById('step-2').style.display = 'none';
                        document.getElementById('step-3').style.display = 'block';
                    } else {
                        var errorText = await r.text();
                        log('FAIL: ' + r.status + ' - ' + errorText);
                        alert('Erreur: ' + r.status + ' (' + errorText + ')');
                        btn.disabled = false;
                        btn.innerText = 'Réessayer';
                    }
                } catch (e) {
                    log('CRASH NET: ' + e.message);
                    alert('Erreur Réseau: Impossible de contacter le serveur. ' + e.message);
                    btn.disabled = false;
                    btn.innerText = 'Réessayer';
                }
            }

            // Attachement des events
            window.onload = function () {
                log('DOM Chargé');
                parseURL();
                setupUI();

                document.getElementById('btn-orange').addEventListener('click', function () { selectOp('ORANGE'); });
                document.getElementById('btn-moov').addEventListener('click', function () { selectOp('MOOV'); });
                document.getElementById('confirm-btn').addEventListener('click', validate);
                document.getElementById('back-btn').addEventListener('click', function () { location.reload(); });
                document.getElementById('finish-btn').addEventListener('click', function () {
                    window.location.href = "https://fasoticket.vercel.app/dashboard";
                });
            };
        })();
    </script>
</body>

</html>
